#  docker compose -f docker-compose-mysql-phpmyadmin.yaml up -d

# docker compose -f docker-compose-mysql-phpmyadmin.yaml down

networks:
  mysql-network:
    name: mysql-network

services:
  mysql:
    image: mysql
    container_name: mysql
    restart: always
    ports:
      - 3309:3306
    volumes:
       - ./mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
#      MYSQL_USER: user
#      MYSQL_PASSWORD: user
#      MYSQL_DATABASE: data
    networks:
      - mysql-network
      
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      PMA_HOSTS: mysql
      PMA_PORT: 3309
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: techjob
      MYSQL_PASSWORD: techjob
      MYSQL_DATABASE: techjob
    networks:
      - mysql-network
 